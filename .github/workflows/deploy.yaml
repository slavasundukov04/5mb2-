name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    permissions:
      contents: "write"
      pages: "write"
      id-token: "write"
    environment:
      name: github-pages
      url: \${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # ЭТА СТРОКА СОЗДАЕТ ПАПКУ DIST С ПРАВИЛЬНЫМИ ПУТЯМИ

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist  # <--- ВОТ ЗДЕСЬ ГЛАВНОЕ: указываем путь к папке dist

      - name: Deploy
        uses: actions/deploy-pages@v3
